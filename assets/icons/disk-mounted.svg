<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Mounted disk with green check -->
  <defs>
    <linearGradient id="dm-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <rect x="2" y="4" width="20" height="16" rx="3" fill="url(#dm-g)"/>
  <rect x="5" y="7" width="14" height="6" rx="1.5" fill="white" opacity="0.2"/>
  <circle cx="17" cy="16" r="1.5" fill="#22C55E"/>
  <line x1="5" y1="16" x2="13" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Green check badge -->
  <circle cx="20" cy="6" r="4" fill="#22C55E"/>
  <polyline points="18 6 19.5 7.5 22 5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
